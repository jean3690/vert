name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_NET_RETRY: 10
  CARGO_HTTP_TIMEOUT: 120
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  # ── Version check ──
  check-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VER=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VER" != "$TAG" ]; then
            echo "❌ Tag v$TAG does not match Cargo.toml version $VER"
            exit 1
          fi
          echo "value=$VER" >> "$GITHUB_OUTPUT"
          echo "✅ Version $VER matches tag $GITHUB_REF_NAME"

  # ── Desktop app (Tauri) ──

  desktop-windows:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v2-release-win

      - name: Build Tauri
        run: pnpm tauri build

      - name: Upload MSI
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: src-tauri/target/release/bundle/msi/*.msi

  desktop-macos:
    needs: check-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v2-release-macos

      - name: Build Tauri
        run: pnpm tauri build

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: src-tauri/target/release/bundle/dmg/*.dmg

  desktop-linux:
    needs: check-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          for i in $(seq 1 5); do sudo apt-get update -qq && break || sleep 10; done
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v2-release-linux

      - name: Build Tauri
        run: pnpm tauri build

      - name: Upload AppImage & Deb
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  # ── CLI binaries per platform ──

  cli:
    needs: check-version
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: vert-linux-amd64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            name: vert-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: vert-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            name: vert-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: vert-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile deps (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v2-release-cli-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --bin vert-cli --release --target ${{ matrix.target }} --no-default-features
        working-directory: src-tauri

      - name: Prepare binary
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/vert-cli.exe" "${{ matrix.name }}"
          else
            cp "target/${{ matrix.target }}/release/vert-cli" "${{ matrix.name }}"
          fi
        working-directory: src-tauri
        shell: bash

      - name: Upload CLI
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: src-tauri/${{ matrix.name }}
