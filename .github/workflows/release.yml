name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Desktop app (Tauri) per platform ──

  desktop-windows:
    runs-on: windows-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_HTTP_TIMEOUT: 120
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri
        run: pnpm tauri build

      - name: Upload MSI
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: src-tauri/target/release/bundle/msi/*.msi

  desktop-macos:
    runs-on: macos-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_HTTP_TIMEOUT: 120
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri
        run: pnpm tauri build

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: src-tauri/target/release/bundle/dmg/*.dmg

  desktop-linux:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_HTTP_TIMEOUT: 120
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install system deps
        run: |
          # Retry apt-get update up to 5 times
          for i in $(seq 1 5); do sudo apt-get update -qq && break || sleep 10; done
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          # Verify glib-2.0 is found
          dpkg -L libglib2.0-dev | grep -E '\.pc$' | head -5
          pkg-config --modversion glib-2.0

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri
        run: pnpm tauri build

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  # ── CLI binaries per platform ──

  cli:
    env:
      CARGO_NET_RETRY: 10
      CARGO_HTTP_TIMEOUT: 120
      CARGO_HTTP_MULTIPLEXING: false
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: vert-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: vert-win-x64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            name: vert-macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build CLI
        run: cargo build --bin vert --release --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: Rename binary
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/vert.exe ${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/vert ${{ matrix.name }}
          fi
        working-directory: src-tauri
        shell: bash

      - name: Upload CLI
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: src-tauri/${{ matrix.name }}
