name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_RETRY: 10
      CARGO_HTTP_TIMEOUT: 120
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          for i in $(seq 1 5); do sudo apt-get update -qq && break || sleep 10; done
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          dpkg -L libglib2.0-dev | grep -E '\.pc$$' | head -5
          pkg-config --modversion glib-2.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests
        run: cargo test
        working-directory: src-tauri

      - name: Build CLI
        run: cargo build --bin vert --release
        working-directory: src-tauri
