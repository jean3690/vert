name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_NET_RETRY: 10
  CARGO_HTTP_TIMEOUT: 120
  CARGO_HTTP_MULTIPLEXING: false

jobs:
  # ── Lint & format ──
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v2-lint

      - name: Check formatting
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy (all features)
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Clippy (no-default-features / CLI)
        run: cargo clippy --no-default-features -- -D warnings
        working-directory: src-tauri

  # ── Security audit ──
  audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-audit
      - name: Audit dependencies
        run: cargo audit
        working-directory: src-tauri
        continue-on-error: true  # advisory DB may be stale on PRs

  # ── Rust tests (Linux) ──
  test-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          for i in $(seq 1 5); do sudo apt-get update -qq && break || sleep 10; done
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          pkg-config --modversion glib-2.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v2-test-linux

      - name: Run tests (all features)
        run: cargo test
        working-directory: src-tauri

      - name: Build CLI release
        run: cargo build --bin vert-cli --release --no-default-features
        working-directory: src-tauri

  # ── Rust tests (Windows) ──
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v2-test-win

      - name: Run library tests (no GUI deps)
        run: cargo test --no-default-features --lib
        working-directory: src-tauri

      - name: Build CLI release
        run: cargo build --bin vert-cli --release --no-default-features
        working-directory: src-tauri

  # ── Frontend ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: pnpm build
